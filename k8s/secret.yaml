apiVersion: v1
kind: Secret
metadata:
  name: stellar-indigopay-secrets
  namespace: stellar-indigopay
type: Opaque
# THIS IS A TEMPLATE. Real values MUST come from one of:
#   1. k8s/external-secret.yaml (hydrated from AWS Secrets Manager via
#      external-secrets-operator — recommended for prod)
#   2. A gitignored k8s/secret.values.yaml + kustomize secretGenerator
#   3. The Helm chart (helm/indigopay/templates/secret.yaml), driven by
#      a gitignored values-prod.yaml.
#
# This file is checked in only so the .github/workflows/secrets-lint.yml
# gate has something to find. The placeholders below use a
# `__LIKE_THIS__` form that the lint regex doesn't match (so the file
# passes the lint) — the comment in front of each value tells you
# what to put there.
stringData:
  POSTGRES_USER: __POSTGRES_USER__ # e.g. indigopay
  POSTGRES_PASSWORD: __POSTGRES_PASSWORD__ # openssl rand -base64 24
  POSTGRES_DB: "stellar_indigopay"
  DATABASE_URL: "postgres://__POSTGRES_USER__:__POSTGRES_PASSWORD__@postgres-svc:5432/stellar_indigopay"
  POSTGRES_REPLICATION_USER: __POSTGRES_REPLICATION_USER__ # e.g. replicator
  POSTGRES_REPLICATION_PASSWORD: __POSTGRES_REPLICATION_PASSWORD__ # openssl rand -base64 24
  RESEND_API_KEY: ""
  ADMIN_API_KEY: ""
  METRICS_BEARER_TOKEN: __METRICS_BEARER_TOKEN__ # openssl rand -hex 32
