apiVersion: v1
kind: Secret
metadata:
  name: indigopay-secrets
  namespace: indigopay
type: Opaque
# Values are base64-encoded placeholders. Replace before applying.
# echo -n 'value' | base64
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "changeme"
  POSTGRES_DB: "indigopay"
  DATABASE_URL: "postgres://postgres:changeme@postgres-svc:5432/indigopay"
  RESEND_API_KEY: ""
  ADMIN_API_KEY: ""
