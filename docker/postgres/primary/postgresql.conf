# docker/postgres/primary/postgresql.conf — Primary config for local dev
# These values are supplemented by command-line -c flags in docker-compose.yml

listen_addresses = '*'
max_connections = 100

# Replication (dev defaults — production values in k8s/helm)
wal_level = replica
max_wal_senders = 5
wal_keep_size = 128MB
max_replication_slots = 5
hot_standby = on

# Performance
shared_buffers = 128MB
effective_cache_size = 384MB
maintenance_work_mem = 32MB
wal_buffers = 8MB

# Logging
log_checkpoints = on
log_connections = on
log_disconnections = on
log_replication_commands = on
