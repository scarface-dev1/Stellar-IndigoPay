# docker/postgres/standby/postgresql.conf — Standby config for local dev
# This standby connects to the primary (postgres:5432) for streaming
# replication. The primary_conninfo is set via the standby.signal file.

listen_addresses = '*'
max_connections = 100

# Hot standby — allow read-only queries
hot_standby = on
hot_standby_feedback = on

# Performance
shared_buffers = 128MB
effective_cache_size = 384MB
maintenance_work_mem = 32MB
wal_buffers = 8MB

# Logging
log_checkpoints = on
log_connections = on
log_replication_commands = on
