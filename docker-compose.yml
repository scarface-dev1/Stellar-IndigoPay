version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: indigopay-postgres-primary
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stellar_indigopay
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/primary/init-replication.sql:/docker-entrypoint-initdb.d/init-replication.sql:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stellar_indigopay"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Warm standby for local DR testing ──────────────────────────────
  # Enabled by default for dev; reads-only. To promote:
  #   docker compose exec postgres-standby pg_ctl promote
  postgres-standby:
    image: postgres:16-alpine
    container_name: indigopay-postgres-standby
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stellar_indigopay
      - PRIMARY_HOST=postgres
      - REPLICATION_USER=replicator
      - REPLICATION_PASSWORD=replicator
    volumes:
      - postgres_standby_data:/var/lib/postgresql/data
      - ./docker/postgres/standby/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/standby/init-standby.sh:/docker-entrypoint-initdb.d/init-standby.sh:ro
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && psql -U postgres -tAc 'SELECT pg_is_in_recovery();' | grep -q t"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_STELLAR_NETWORK=testnet
      - NEXT_PUBLIC_HORIZON_URL=https://horizon-testnet.stellar.org
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend
    command: npm run dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=development
      - STELLAR_NETWORK=testnet
      - HORIZON_URL=https://horizon-testnet.stellar.org
      - ALLOWED_ORIGINS=http://localhost:3000
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/stellar_indigopay
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres_data:
  postgres_standby_data:
